<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Отслеживание U6 1555</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", Arial, sans-serif;
            background: #f5f5f7;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            margin: 0;
        }

        .card {
            max-width: 640px;
            width: 100%;
            background: #ffffff;
            border-radius: 32px;
            padding: 32px 28px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.06);
        }

        .flight-badge {
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.06em;
            color: #8e8e93;
            text-transform: uppercase;
        }

        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 4px;
        }

        h1 {
            font-size: 36px;
            font-weight: 700;
            letter-spacing: -0.02em;
            color: #1d1d1f;
        }

        .status-pill {
            font-size: 15px;
            font-weight: 500;
            padding: 6px 16px;
            border-radius: 20px;
            background: #e5e5ea;
            color: #1d1d1f;
        }

        .status-pill.flying {
            background: #34c759;
            color: #fff;
        }
        .status-pill.landed {
            background: #8e8e93;
            color: #fff;
        }
        .status-pill.delayed {
            background: #e53935;
            color: #fff;
        }
        .status-pill.scheduled {
            background: #007aff;
            color: #fff;
        }

        .route {
            font-size: 17px;
            font-weight: 400;
            color: #8e8e93;
            margin-bottom: 20px;
            border-bottom: 1px solid #e5e5ea;
            padding-bottom: 14px;
        }

        /* Сетка показателей */
        .metrics-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }

        .metric {
            background: #f8f8fa;
            border-radius: 16px;
            padding: 14px 12px;
            text-align: center;
        }

        .metric-label {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            color: #8e8e93;
        }

        .metric-value {
            font-size: 24px;
            font-weight: 700;
            color: #1d1d1f;
            margin-top: 4px;
        }

        .metric-value .unit {
            font-size: 14px;
            font-weight: 400;
            color: #8e8e93;
            margin-left: 2px;
        }

        /* Детали */
        .detail-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #f0f0f2;
        }

        .detail-row:last-of-type {
            border-bottom: none;
        }

        .detail-label {
            font-size: 15px;
            color: #6e6e73;
        }

        .detail-value {
            font-size: 16px;
            font-weight: 600;
            color: #1d1d1f;
            text-align: right;
        }

        .countdown {
            font-size: 20px;
            font-weight: 700;
            color: #007aff;
        }

        .countdown.urgent {
            color: #e53935;
        }

        /* Карта */
        #map {
            width: 100%;
            height: 200px;
            border-radius: 16px;
            margin: 16px 0 12px;
            background: #e5e5ea;
            border: none;
        }

        .update-info {
            font-size: 12px;
            color: #8e8e93;
            text-align: center;
            margin-top: 10px;
        }

        .update-info span {
            font-weight: 600;
            color: #1d1d1f;
        }

        .live-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #34c759;
            border-radius: 50%;
            margin-right: 6px;
            animation: blink 1.4s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.2; }
        }
    </style>
</head>
<body>

<div class="card" id="app">
    <div class="flight-badge">✈️ LIVE • Рейс</div>
    <div class="header-row">
        <h1>U6 1555</h1>
        <span class="status-pill" id="statusPill">Загрузка…</span>
    </div>
    <div class="route" id="routeLabel">— → —</div>

    <!-- 3 главные метрики: высота, скорость, до прилёта -->
    <div class="metrics-grid">
        <div class="metric">
            <div class="metric-label">Высота</div>
            <div class="metric-value" id="altitudeValue">— <span class="unit">км</span></div>
        </div>
        <div class="metric">
            <div class="metric-label">Скорость</div>
            <div class="metric-value" id="speedValue">— <span class="unit">км/ч</span></div>
        </div>
        <div class="metric">
            <div class="metric-label">До прилёта</div>
            <div class="metric-value countdown" id="countdownValue">—</div>
        </div>
    </div>

    <!-- Карта (OpenStreetMap) -->
    <div id="map"></div>

    <!-- Детальная информация -->
    <div class="detail-row">
        <span class="detail-label">Аэропорт вылета</span>
        <span class="detail-value" id="depAirport">—</span>
    </div>
    <div class="detail-row">
        <span class="detail-label">Аэропорт прилёта</span>
        <span class="detail-value" id="arrAirport">—</span>
    </div>
    <div class="detail-row">
        <span class="detail-label">Вылет (по расписанию)</span>
        <span class="detail-value" id="schedDep">—</span>
    </div>
    <div class="detail-row">
        <span class="detail-label">Прилёт (по расписанию)</span>
        <span class="detail-value" id="schedArr">—</span>
    </div>
    <div class="detail-row">
        <span class="detail-label">Задержка</span>
        <span class="detail-value" id="delayValue">0 мин</span>
    </div>

    <div class="update-info">
        <span class="live-dot"></span> Обновление каждые <span>10</span> сек • <span id="lastUpdate">только что</span>
    </div>
</div>

<!-- Подключаем Leaflet для карты -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    (function() {
        const API_KEY = '50148e0eddfdf257f62f32d0d4b6a830';
        const FLIGHT_IATA = 'U61555';

        // DOM-элементы
        const statusPill = document.getElementById('statusPill');
        const routeLabel = document.getElementById('routeLabel');
        const altitudeValue = document.getElementById('altitudeValue');
        const speedValue = document.getElementById('speedValue');
        const countdownValue = document.getElementById('countdownValue');
        const depAirport = document.getElementById('depAirport');
        const arrAirport = document.getElementById('arrAirport');
        const schedDep = document.getElementById('schedDep');
        const schedArr = document.getElementById('schedArr');
        const delayValue = document.getElementById('delayValue');
        const lastUpdate = document.getElementById('lastUpdate');

        // Переменные для карты
        let map = null;
        let marker = null;
        let pathLine = null;
        const pathPoints = [];

        // Функция для отрисовки карты
        function initMap(lat, lng) {
            if (!map) {
                map = L.map('map').setView([lat, lng], 6);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                    attribution: '© OpenStreetMap',
                    maxZoom: 18,
                }).addTo(map);
            }

            if (!marker) {
                const icon = L.divIcon({
                    className: 'custom-div-icon',
                    html: `<div style="background:#007aff; width:14px; height:14px; border-radius:50%; border:3px solid white; box-shadow:0 0 12px rgba(0,122,255,0.6);"></div>`,
                    iconSize: [20, 20],
                    iconAnchor: [10, 10],
                });
                marker = L.marker([lat, lng], { icon }).addTo(map);
            } else {
                marker.setLatLng([lat, lng]);
            }

            // Сохраняем трек
            pathPoints.push([lat, lng]);
            if (pathPoints.length > 1) {
                if (pathLine) {
                    map.removeLayer(pathLine);
                }
                pathLine = L.polyline(pathPoints, {
                    color: '#007aff',
                    weight: 3,
                    opacity: 0.6,
                }).addTo(map);
            }

            map.setView([lat, lng], 6);
        }

        // Форматирование времени
        function formatTime(utcString) {
            if (!utcString) return '—';
            const d = new Date(utcString + 'Z');
            if (isNaN(d)) return '—';
            return d.toLocaleTimeString('ru-RU', {
                hour: '2-digit',
                minute: '2-digit',
                timeZone: 'Europe/Moscow'
            });
        }

        // Подсчёт времени до прилёта
        function getCountdown(arrivalScheduled) {
            if (!arrivalScheduled) return '—';
            const now = new Date();
            const arrival = new Date(arrivalScheduled + 'Z');
            const diffMs = arrival - now;
            if (diffMs <= 0) return '📍 Прибыл';
            const diffMin = Math.floor(diffMs / 60000);
            if (diffMin < 60) return `${diffMin} мин`;
            const hours = Math.floor(diffMin / 60);
            const mins = diffMin % 60;
            return `${hours} ч ${mins} мин`;
        }

        // Основной запрос
        async function fetchFlight() {
            try {
                const url = `http://api.aviationstack.com/v1/flights?access_key=${API_KEY}&flight_iata=${FLIGHT_IATA}`;
                const response = await fetch(url);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const data = await response.json();

                if (!data.data || data.data.length === 0) {
                    throw new Error('Рейс не найден');
                }

                const flight = data.data[0];

                // --- Статус ---
                const status = flight.flight_status || 'scheduled';
                let statusText = status.charAt(0).toUpperCase() + status.slice(1);
                let pillClass = 'scheduled';
                if (status === 'scheduled') { statusText = 'По расписанию'; pillClass = 'scheduled'; }
                else if (status === 'active') { statusText = '✈️ В полёте'; pillClass = 'flying'; }
                else if (status === 'landed') { statusText = '✅ Приземлился'; pillClass = 'landed'; }
                else if (status === 'cancelled') { statusText = '❌ Отменён'; pillClass = 'delayed'; }
                else if (status === 'incident') { statusText = '⚠️ Задержан'; pillClass = 'delayed'; }
                statusPill.textContent = statusText;
                statusPill.className = `status-pill ${pillClass}`;

                // --- Маршрут ---
                const depCity = flight.departure?.airport || '—';
                const arrCity = flight.arrival?.airport || '—';
                routeLabel.textContent = `${depCity} → ${arrCity}`;

                // --- Высота и скорость (берём из live данных, если есть) ---
                const altitudeFt = flight.live?.altitude || 0; // в футах
                const altitudeKm = (altitudeFt * 0.0003048).toFixed(1);
                altitudeValue.innerHTML = `${altitudeFt > 0 ? altitudeKm : '—'} <span class="unit">км</span>`;

                const speedKt = flight.live?.speed_horizontal || 0; // в узлах
                const speedKmh = Math.round(speedKt * 1.852);
                speedValue.innerHTML = `${speedKt > 0 ? speedKmh : '—'} <span class="unit">км/ч</span>`;

                // --- Время до прилёта ---
                const arrivalSched = flight.arrival?.scheduled;
                const countdownText = getCountdown(arrivalSched);
                countdownValue.textContent = countdownText;
                countdownValue.className = 'metric-value countdown';
                if (countdownText.includes('мин') && parseInt(countdownText) < 30) {
                    countdownValue.classList.add('urgent');
                }

                // --- Аэропорты ---
                depAirport.textContent = flight.departure?.iata || '—';
                arrAirport.textContent = flight.arrival?.iata || '—';

                // --- Время вылета/прилёта ---
                schedDep.textContent = formatTime(flight.departure?.scheduled);
                schedArr.textContent = formatTime(arrivalSched);

                // --- Задержка ---
                const delayMin = flight.departure?.delay || 0;
                delayValue.textContent = delayMin > 0 ? `+${delayMin} мин` : '0 мин (по расписанию)';

                // --- Карта (координаты из live) ---
                const lat = flight.live?.latitude;
                const lng = flight.live?.longitude;
                if (lat && lng && status === 'active') {
                    initMap(lat, lng);
                } else if (lat && lng) {
                    initMap(lat, lng);
                } else {
                    // Если координат нет — попробуем взять аэропорт вылета
                    const depLat = flight.departure?.latitude;
                    const depLng = flight.departure?.longitude;
                    if (depLat && depLng) {
                        initMap(depLat, depLng);
                    }
                }

                // --- Время обновления ---
                const now = new Date();
                lastUpdate.textContent = now.toLocaleTimeString('ru-RU', {
                    hour: '2-digit',
                    minute: '2-digit',
                    second: '2-digit'
                });

            } catch (error) {
                console.error('Ошибка:', error);
                statusPill.textContent = '⚠️ Ошибка';
                statusPill.className = 'status-pill delayed';
                lastUpdate.textContent = `Ошибка: ${error.message}`;
            }
        }

        // Запускаем первый раз
        fetchFlight();

        // И каждые 10 секунд — автоматически!
        setInterval(fetchFlight, 10000);

    })();
</script>

</body>
</html>
