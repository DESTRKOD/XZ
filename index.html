<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>U6 1555</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", Arial, sans-serif;
            background: #f5f5f7;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            margin: 0;
        }

        .card {
            max-width: 380px;
            width: 100%;
            background: #ffffff;
            border-radius: 28px;
            padding: 32px 24px 24px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.06);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .flight-number {
            font-size: 32px;
            font-weight: 700;
            color: #1d1d1f;
            letter-spacing: -0.02em;
        }

        .status-badge {
            font-size: 13px;
            font-weight: 600;
            padding: 4px 14px;
            border-radius: 20px;
            background: #34c759;
            color: #fff;
        }

        .status-badge.landed {
            background: #8e8e93;
        }

        .status-badge.waiting {
            background: #007aff;
        }

        .status-badge.error {
            background: #e53935;
        }

        .metrics {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            margin-bottom: 16px;
        }

        .metric {
            background: #f8f8fa;
            border-radius: 14px;
            padding: 14px 8px;
            text-align: center;
        }

        .metric-label {
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            color: #8e8e93;
        }

        .metric-value {
            font-size: 22px;
            font-weight: 700;
            color: #1d1d1f;
            margin-top: 2px;
        }

        .metric-value .unit {
            font-size: 13px;
            font-weight: 400;
            color: #8e8e93;
        }

        .live-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 12px;
            font-size: 12px;
            color: #8e8e93;
        }

        .live-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #34c759;
            border-radius: 50%;
            margin-right: 6px;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.2; }
        }

        .update-time {
            font-weight: 500;
            color: #1d1d1f;
        }

        .error-msg {
            color: #e53935;
            font-size: 13px;
            text-align: center;
            margin-top: 8px;
            display: none;
        }

        .error-msg.show {
            display: block;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <span class="flight-number">Самолет Анны</span>
        <span class="status-badge" id="statusBadge">● В полёте</span>
    </div>

    <div class="metrics">
        <div class="metric">
            <div class="metric-label">Высота</div>
            <div class="metric-value" id="altitude">— <span class="unit">км</span></div>
        </div>
        <div class="metric">
            <div class="metric-label">Скорость</div>
            <div class="metric-value" id="speed">— <span class="unit">км/ч</span></div>
        </div>
        <div class="metric">
            <div class="metric-label">До прилёта</div>
            <div class="metric-value" id="eta">—</div>
        </div>
    </div>

    <div class="live-info">
        <span><span class="live-dot"></span> LIVE</span>
        <span>обновлено: <span class="update-time" id="updateTime">—</span></span>
    </div>

    <div class="error-msg" id="errorMsg">⚠️ Ошибка загрузки данных</div>
</div>

<script>
    (function() {
        const API_KEY = '50148e0eddfdf257f62f32d0d4b6a830';
        const FLIGHT = 'U61555';

        const altitudeEl = document.getElementById('altitude');
        const speedEl = document.getElementById('speed');
        const etaEl = document.getElementById('eta');
        const statusBadge = document.getElementById('statusBadge');
        const updateTimeEl = document.getElementById('updateTime');
        const errorMsg = document.getElementById('errorMsg');

        function formatTime(utcString) {
            if (!utcString) return '—';
            const d = new Date(utcString + 'Z');
            if (isNaN(d)) return '—';
            return d.toLocaleTimeString('ru-RU', {
                hour: '2-digit',
                minute: '2-digit',
                timeZone: 'Europe/Moscow'
            });
        }

        function getCountdown(arrivalUTC) {
            if (!arrivalUTC) return '—';
            const now = new Date();
            const arrival = new Date(arrivalUTC + 'Z');
            const diff = arrival - now;

            if (diff <= 0) return '📍 Прибыл';

            const minutes = Math.floor(diff / 60000);
            if (minutes < 60) return `${minutes} мин`;

            const hours = Math.floor(minutes / 60);
            const mins = minutes % 60;
            return `${hours}ч ${mins}м`;
        }

        async function fetchData() {
            try {
                // ✅ ИСПРАВЛЕНО: https вместо http
                const url = `https://api.aviationstack.com/v1/flights?access_key=${API_KEY}&flight_iata=${FLIGHT}`;
                const response = await fetch(url);

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }

                const data = await response.json();

                if (!data.data || data.data.length === 0) {
                    throw new Error('Рейс не найден');
                }

                errorMsg.classList.remove('show');

                const f = data.data[0];
                const status = f.flight_status || 'scheduled';

                // Статус
                if (status === 'active') {
                    statusBadge.textContent = '● В полёте';
                    statusBadge.className = 'status-badge';
                } else if (status === 'landed') {
                    statusBadge.textContent = '◆ Приземлился';
                    statusBadge.className = 'status-badge landed';
                } else if (status === 'cancelled') {
                    statusBadge.textContent = '✕ Отменён';
                    statusBadge.className = 'status-badge error';
                } else {
                    statusBadge.textContent = '◌ Ожидание';
                    statusBadge.className = 'status-badge waiting';
                }

                // Высота
                const altFt = f.live?.altitude || 0;
                const altKm = altFt > 0 ? (altFt * 0.0003048).toFixed(1) : '—';
                altitudeEl.innerHTML = `${altKm} <span class="unit">км</span>`;

                // Скорость
                const speedKt = f.live?.speed_horizontal || 0;
                const speedKmh = speedKt > 0 ? Math.round(speedKt * 1.852) : '—';
                speedEl.innerHTML = `${speedKmh} <span class="unit">км/ч</span>`;

                // Время до прилёта
                const arrivalSched = f.arrival?.scheduled;
                const etaText = getCountdown(arrivalSched);
                etaEl.textContent = etaText;

                // Время обновления
                const now = new Date();
                updateTimeEl.textContent = now.toLocaleTimeString('ru-RU', {
                    hour: '2-digit',
                    minute: '2-digit',
                    second: '2-digit'
                });

            } catch (error) {
                console.error('Ошибка:', error);
                statusBadge.textContent = '⚠️ Ошибка';
                statusBadge.className = 'status-badge error';
                errorMsg.classList.add('show');
                errorMsg.textContent = `⚠️ ${error.message}`;
                updateTimeEl.textContent = '—';
            }
        }

        // Запускаем сразу и каждые 2 секунды
        fetchData();
        setInterval(fetchData, 2000);

    })();
</script>

</body>
</html>
